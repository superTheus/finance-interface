<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="description" content="Orbitus está offline no momento." />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <title>Orbitus offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #f7f8ff;
        --bg-deep: #eef2ff;
        --panel: #ffffff;
        --ink: #0b1020;
        --muted: #5c647a;
        --brand: #6c5ce7;
        --brand-hover: #8573ff;
        --accent: #00d4c8;
        --line: rgba(11, 16, 32, 0.12);
        --shadow: 0 18px 42px rgba(28, 34, 58, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at top left, rgba(108, 92, 231, 0.14), transparent 34rem),
          radial-gradient(circle at bottom right, rgba(0, 212, 200, 0.1), transparent 28rem),
          linear-gradient(135deg, var(--bg) 0%, var(--bg-deep) 100%);
        color: var(--ink);
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 24px;
      }

      main {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        max-width: 440px;
        padding: 32px;
        text-align: center;
        width: 100%;
      }

      img {
        display: block;
        height: 82px;
        margin: 0 auto 22px;
        width: 82px;
      }

      h1 {
        color: var(--ink);
        font-size: clamp(1.7rem, 6vw, 2.35rem);
        line-height: 1.08;
        margin: 0 0 12px;
      }

      p {
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
        margin: 0;
      }

      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 28px;
      }

      button,
      a {
        align-items: center;
        border-radius: 8px;
        display: inline-flex;
        font: inherit;
        font-weight: 700;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        text-decoration: none;
      }

      button {
        background: var(--brand);
        border: 0;
        color: #ffffff;
        cursor: pointer;
      }

      button:hover {
        background: var(--brand-hover);
      }

      a {
        border: 1px solid var(--line);
        color: var(--accent);
      }

      small {
        color: #758196;
        display: block;
        line-height: 1.5;
        margin-top: 22px;
      }

      @media (max-width: 420px) {
        body {
          padding: 16px;
        }

        main {
          padding: 26px 20px;
        }

        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-192x192.png" alt="Orbitus" width="82" height="82" />
      <h1>Você está offline</h1>
      <p>
        Não conseguimos conectar ao Orbitus agora. Confira sua internet e tente novamente
        para voltar ao seu universo financeiro.
      </p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Tentar novamente</button>
        <a href="/">Início</a>
      </div>
      <small>Algumas informações podem estar indisponíveis até a conexão voltar.</small>
    </main>
  </body>
</html>
